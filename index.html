<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Measurer</title>
    <link type="text/css" rel="stylesheet" href="styles.css">

    <!-- Firebase SDK (defer to avoid blocking initial render & WASM loading) -->
    <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics-compat.js"></script>
    <script defer>
        // Wait for Firebase SDK to be available, then initialize
        document.addEventListener('DOMContentLoaded', function() {
            function tryInitFirebase() {
                if (typeof firebase !== 'undefined' && firebase.initializeApp) {
                    var firebaseConfig = {
                        apiKey: "AIzaSyARDge4x1EEv5W1jJ15QdO5OW2RLLHNLqc",
                        authDomain: "snakemeasurer.firebaseapp.com",
                        projectId: "snakemeasurer",
                        storageBucket: "snakemeasurer.firebasestorage.app",
                        messagingSenderId: "223904200399",
                        appId: "1:223904200399:web:2e98ea1c1f3f9fa54069ba",
                        measurementId: "G-L6SQPK4C0V"
                    };

                    window.firebaseApp = firebase.initializeApp(firebaseConfig);
                    window.firebaseAnalytics = null;
                    window._firebaseReady = true;

                    // Resolve any pending Firebase init waiters
                    if (window._firebaseReadyResolve) window._firebaseReadyResolve();
                } else {
                    // Firebase SDK not yet loaded, retry
                    setTimeout(tryInitFirebase, 50);
                }
            }
            tryInitFirebase();
        });

        // Promise that resolves when Firebase is ready (used by Kotlin interop)
        window._firebaseReadyPromise = new Promise(function(resolve) {
            window._firebaseReadyResolve = resolve;
            if (window._firebaseReady) resolve();
        });

        // Firebase helper functions (available immediately, guard with _firebaseReady check)
        window.initFirebaseAnalytics = function(enabled) {
            if (!window._firebaseReady) {
                window._firebaseReadyPromise.then(function() { window.initFirebaseAnalytics(enabled); });
                return;
            }
            if (enabled && !window.firebaseAnalytics) {
                window.firebaseAnalytics = firebase.analytics();
            }
        };

        window.trackFirebaseEvent = function(eventName, params) {
            if (window.firebaseAnalytics) {
                window.firebaseAnalytics.logEvent(eventName, params);
            }
        };

        window.trackFirebasePageView = function(pagePath) {
            if (window.firebaseAnalytics) {
                window.firebaseAnalytics.logEvent('page_view', { page_path: pagePath });
            }
        };
    </script>
</head>
<body style="text-align: center; align-content: center">
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
    <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
    <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
            stroke-dasharray="90 125">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                          repeatCount="indefinite"/>
    </circle>
</svg>
<script type="application/javascript" src="composeApp.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(function(e) {
            console.warn('SW registration failed:', e);
        });
    }
</script>
</body>
</html>
